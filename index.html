<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RockPaperScissor Game</title>
    <link rel="apple-touch-icon" sizes="180x180" href="favicon_io (1)/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon_io (1)/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon_io (1)/favicon-16x16.png">
<link rel="manifest" href="favicon_io (1)/site.webmanifest">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <h1>Rock Paper Scissors</h1>
    <button id="modee">Change Theme</button>
    <div class="choices">
        <div class="choice" id="rock">
           <img src="imagesforgame/rock-icon.png">
        </div>
        <div class="choice" id="paper">
           <img src="imagesforgame/paper-icon.png">
        </div>
        <div class="choice" id="scissors">
           <img src="imagesforgame/scissors-icon.png">
        </div>
    </div>
    <div class="score-board">
        <div class="score">
            <p id="user-score">0</p>
            <p>You</p>
        </div>
        <div class="score">
            <p id="comp-score">0</p>
            <p>Computer</p>
        </div>
    </div>
    <div class="msg-container">
        <p id="msg">Play your move</p>
    </div>
    <script src="app.js"></script>
</body>
</html>
